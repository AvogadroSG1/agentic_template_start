# Extended from the minimal secret-scan hook contract; x2k adds lint/format/test gates here.
pre-commit:
  parallel: true
  commands:
    secret-scan:
      run: ./.claude/hooks/secret-scan.sh scan-staged
    lint:
      run: mise run lint
    fmt:
      run: mise run fmt

pre-push:
  commands:
    test:
      run: mise run test
