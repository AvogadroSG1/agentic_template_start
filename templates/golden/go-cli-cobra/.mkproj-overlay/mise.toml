[tools]
go = "1.26.2"
"github:golangci/golangci-lint" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"ubi:evilmartians/lefthook" = "latest"

[tasks.fmt]
run = "gofmt -w $(find . -name '*.go' -not -path './.git/*')"

[tasks.lint]
run = "golangci-lint run ./..."

[tasks.test]
run = "go test ./..."

[tasks.ci]
run = "mise run fmt && mise run lint && mise run test && govulncheck ./..."
